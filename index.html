<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Calendar</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.title {
  font-size: 26px;
  font-weight: 600;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin-top: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  border-radius: 16px;
  background: black;
  color: white;
  font-size: 16px;
}

.small {
  color: #666;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">✈️ Flight Calendar</div>

  <div class="card">
    <input id="origen" placeholder="Origen (PTY)">
    <input id="destino" placeholder="Destino (MEX)">
    <input id="fecha" placeholder="Fecha">
    <button onclick="buscar()">Buscar vuelos</button>
  </div>

  <div id="resultados"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
const API_KEY = "11487a73710383d34fb869029044215d";

flatpickr("#fecha", { dateFormat: "Y-m-d" });

// Fetch + filtros fuertes
async function buscar() {
  const origen = document.getElementById("origen").value.toUpperCase();
  const destino = document.getElementById("destino").value.toUpperCase();
  const fecha = document.getElementById("fecha").value;

  const cont = document.getElementById("resultados");
  cont.innerHTML = "Buscando...";

  try {
    const res = await fetch(
      `https://api.allorigins.win/get?url=http://api.aviationstack.com/v1/flights?access_key=${API_KEY}&dep_iata=${origen}&arr_iata=${destino}&flight_date=${fecha}`
    );

    const result = await res.json();
    const data = JSON.parse(result.contents);

    // 🔥 FILTRO FUERTE
    let vuelos = data.data.filter(v => {
      if (!v.flight || !v.departure || !v.arrival) return false;
      if (!v.departure.scheduled || !v.arrival.scheduled) return false;

      // estado válido
      if (v.flight_status !== "scheduled" && v.flight_status !== "active") return false;

      // misma fecha
      if (!v.departure.scheduled.startsWith(fecha)) return false;

      return true;
    });

    // quitar duplicados por número de vuelo
    const vistos = new Set();
    vuelos = vuelos.filter(v => {
      const key = v.flight.iata + v.departure.scheduled;
      if (vistos.has(key)) return false;
      vistos.add(key);
      return true;
    });

    cont.innerHTML = "";

    if (vuelos.length === 0) {
      cont.innerHTML = "No se encontraron vuelos confiables";
      return;
    }

    vuelos.slice(0,8).forEach(v => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <strong>${origen} → ${destino}</strong><br>
        Vuelo ${v.flight.iata || "N/A"}<br>
        <span class="small">
          ${new Date(v.departure.scheduled).toLocaleString()} →
          ${new Date(v.arrival.scheduled).toLocaleString()}
        </span>
        <button onclick='ics("${v.flight.iata}", "${v.departure.scheduled}", "${v.arrival.scheduled}", "${origen}", "${destino}")'>
          Agregar al calendario
        </button>
      `;

      cont.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    cont.innerHTML = "Error cargando vuelos";
  }
}

// ICS iPhone
function formatICS(d) {
  return new Date(d).toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
}

function ics(num, sal, lleg, ori, des) {
  const contenido = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Vuelo ${num} ${ori} → ${des}
DTSTART:${formatICS(sal)}
DTEND:${formatICS(lleg)}
END:VEVENT
END:VCALENDAR`;

  const blob = new Blob([contenido], {type:"text/calendar"});
  const url = URL.createObjectURL(blob);
  window.location.href = url;
}
</script>

</body>
</html>
