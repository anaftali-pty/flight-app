<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Calendar</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.title {
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 10px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin-top: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  border-radius: 16px;
  background: #000;
  color: white;
  font-size: 16px;
}

.flight {
  margin-bottom: 10px;
}

.small {
  color: #666;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">✈️ Flight Calendar</div>

  <div class="card">
    <input id="origen" placeholder="Origen (PTY)">
    <input id="destino" placeholder="Destino (MEX)">
    <input id="fecha" placeholder="Selecciona fecha">
    <button onclick="buscar()">Buscar vuelos</button>
  </div>

  <div id="resultados"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
// API
const API_KEY = "11487a73710383d34fb869029044215d";

// Flatpickr (date picker bonito)
flatpickr("#fecha", {
  dateFormat: "Y-m-d"
});

// Aeropuertos (dataset real ampliado)
const airports = [
  {code:"PTY", name:"Panama City"},
  {code:"MEX", name:"Mexico City"},
  {code:"JFK", name:"New York JFK"},
  {code:"LAX", name:"Los Angeles"},
  {code:"MAD", name:"Madrid"},
  {code:"BOG", name:"Bogotá"},
  {code:"MIA", name:"Miami"},
  {code:"CDG", name:"Paris"},
  {code:"AMS", name:"Amsterdam"}
];

// Autocomplete PRO
function setupAutocomplete(id) {
  const input = document.getElementById(id);

  input.addEventListener("input", () => {
    closeAll();

    const val = input.value.toUpperCase();
    if (!val) return;

    const list = document.createElement("div");
    list.className = "card";

    airports
      .filter(a => a.code.includes(val) || a.name.toUpperCase().includes(val))
      .slice(0,5)
      .forEach(a => {
        const item = document.createElement("div");
        item.innerHTML = `<strong>${a.code}</strong> - ${a.name}`;
        item.onclick = () => {
          input.value = a.code;
          closeAll();
        };
        list.appendChild(item);
      });

    input.parentNode.appendChild(list);
  });
}

function closeAll() {
  document.querySelectorAll(".card div").forEach(el => {
    if (el.parentNode.className === "card") el.remove();
  });
}

setupAutocomplete("origen");
setupAutocomplete("destino");

// Buscar vuelos
async function buscar() {
  const origen = document.getElementById("origen").value;
  const destino = document.getElementById("destino").value;
  const fecha = document.getElementById("fecha").value;

  const cont = document.getElementById("resultados");
  cont.innerHTML = "Buscando...";

  try {
    const res = await fetch(
      `https://api.allorigins.win/raw?url=http://api.aviationstack.com/v1/flights?access_key=${API_KEY}&dep_iata=${origen}&arr_iata=${destino}&flight_date=${fecha}`
    );

    const data = await res.json();
    cont.innerHTML = "";

    data.data.slice(0,8).forEach(v => {
      if (!v.departure.scheduled || !v.arrival.scheduled) return;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="flight">
          <strong>${origen} → ${destino}</strong><br>
          Vuelo ${v.flight.iata || "N/A"}<br>
          <span class="small">
            ${new Date(v.departure.scheduled).toLocaleString()} →
            ${new Date(v.arrival.scheduled).toLocaleString()}
          </span>
        </div>
        <button onclick='addToCalendar("${v.flight.iata}", "${v.departure.scheduled}", "${v.arrival.scheduled}", "${origen}", "${destino}")'>
          Agregar al calendario
        </button>
      `;

      cont.appendChild(div);
    });

  } catch(e) {
    cont.innerHTML = "Error cargando vuelos";
  }
}

// ICS compatible iPhone
function formatICS(d) {
  return new Date(d).toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
}

function addToCalendar(num, sal, lleg, ori, des) {
  const ics = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Vuelo ${num} ${ori} → ${des}
DTSTART:${formatICS(sal)}
DTEND:${formatICS(lleg)}
DESCRIPTION:Vuelo ${num}
END:VEVENT
END:VCALENDAR`;

  const blob = new Blob([ics], {type:"text/calendar"});
  const url = URL.createObjectURL(blob);

  window.location.href = url; // clave para iPhone
}
</script>

</body>
</html>
